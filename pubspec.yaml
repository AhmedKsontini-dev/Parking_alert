name: parking_alert_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  http: ^1.2.0

  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.1.2

  shared_preferences: ^2.3.2
  intl: ^0.20.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/voiture.png

# flutter_launcher_icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/voiture.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/voiture.png"
    favicon_path: "assets/favicon.png"
